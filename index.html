<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="meta-title">Exclusive Offer</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" id="meta-description" content="Get the best deals here. Fast shipping and full warranty. Check it out!">
    
    <style>
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #28a745;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-family: sans-serif; color: #333; font-weight: 500;">Loading best deals...</p>
    </div>

    <div class="page-container">
        <main class="product-card">
            <div class="product-image">
                <img src="" id="foto-produto" alt="Product Image">
            </div>

            <section class="product-info">
                <h1 id="titulo-produto"></h1>
                <p class="description"></p>
                
                <div class="price-container">
                    <span class="current-price" id="preco-exibicao"></span>
                </div>

                <button id="btn-vendas" class="cta-button">Buy Now</button>

                <section class="admin-panel" id="painel-admin" style="display: none; background: #eee; padding: 15px; border-radius: 8px; margin-top: 20px;">
                    <h3>Product Settings</h3>
                    <input type="text" id="input-titulo" placeholder="Product Title" style="display:block; width:90%; margin:5px 0;">
                    <input type="text" id="input-descricao" placeholder="Short Description" style="display:block; width:90%; margin:5px 0;">
                    <input type="text" id="input-link" placeholder="Affiliate Link" style="display:block; width:90%; margin:5px 0;">
                    <input type="text" id="input-foto" placeholder="Image URL" style="display:block; width:90%; margin:5px 0;">
                    <input type="text" id="input-preco" placeholder="Price (Ex: 97.00)" style="display:block; width:90%; margin:5px 0;">
                    <button onclick="salvarConfiguracoes()" style="background: #28a745; color: white; border: none; padding: 10px; cursor: pointer;">Save to Cloud</button>
                </section>
            </section>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
